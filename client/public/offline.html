<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline | ITMS</title>
    <style>
      body {
        margin: 0;
        font-family: Rubik, system-ui, -apple-system, Segoe UI, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 460px;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.07);
      }
      .title {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }
      .text {
        margin: 10px 0 0;
        color: #475569;
        line-height: 1.5;
      }
      .btn {
        margin-top: 18px;
        display: inline-block;
        text-decoration: none;
        background: #4f62c7;
        color: #fff;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1 class="title">You are offline</h1>
      <p class="text">
        ITMS cannot reach the internet right now. Reconnect and retry to sync your latest data.
      </p>
      <a class="btn" href="/">Try again</a>
    </section>
  </body>
</html>
